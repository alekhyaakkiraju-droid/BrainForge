name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # Never cancel an in-flight staging deploy

env:
  FLUTTER_VERSION: "3.22.0"
  JAVA_VERSION: "17"

jobs:
  build-android:
    name: Build Android (staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write staging google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON_STAGING }}' > android/app/src/staging/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android AAB (staging flavor)
        run: |
          flutter build appbundle \
            --flavor staging \
            --dart-define=FLAVOR=staging \
            --release

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-staging-aab
          path: build/app/outputs/bundle/stagingRelease/app-staging-release.aab

  build-ios:
    name: Build iOS (staging)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write staging GoogleService-Info.plist
        run: echo '${{ secrets.GOOGLE_SERVICE_INFO_PLIST_STAGING }}' > ios/config/staging/GoogleService-Info.plist

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no-codesign for CI artifact)
        run: |
          flutter build ios \
            --flavor staging \
            --dart-define=FLAVOR=staging \
            --release \
            --no-codesign

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-staging-build
          path: build/ios/iphoneos/Runner.app

  deploy-functions-staging:
    name: Deploy Cloud Functions (staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Cloud Functions to staging
        run: |
          if [ -d "functions" ]; then
            firebase deploy --only functions \
              --project brainforge-staging \
              --token "${{ secrets.FIREBASE_CLI_TOKEN }}"
          else
            echo "No Cloud Functions yet — skipping (added in WO-008)"
          fi

  deploy-firestore-rules-staging:
    name: Deploy Firestore Rules (staging)
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules + indexes to staging
        run: |
          if [ -f "firestore.rules" ]; then
            firebase deploy --only firestore \
              --project brainforge-staging \
              --token "${{ secrets.FIREBASE_CLI_TOKEN }}"
          else
            echo "No Firestore rules yet — skipping (added in WO-007)"
          fi

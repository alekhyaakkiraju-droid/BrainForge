name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.22.0"
  JAVA_VERSION: "17"

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check for outdated packages
        run: flutter pub outdated --no-color || true   # advisory only, not a hard failure

      - name: Dart analyze (zero issues enforced)
        run: flutter analyze --fatal-infos

      - name: Run unit tests with coverage
        run: flutter test --coverage --reporter=github
        env:
          FLAVOR: dev
          FIREBASE_ANDROID_API_KEY_DEV: ${{ secrets.FIREBASE_ANDROID_API_KEY_DEV }}
          FIREBASE_ANDROID_APP_ID_DEV: ${{ secrets.FIREBASE_ANDROID_APP_ID_DEV }}
          FIREBASE_ANDROID_SENDER_ID_DEV: ${{ secrets.FIREBASE_ANDROID_SENDER_ID_DEV }}
          FIREBASE_IOS_API_KEY_DEV: ${{ secrets.FIREBASE_IOS_API_KEY_DEV }}
          FIREBASE_IOS_APP_ID_DEV: ${{ secrets.FIREBASE_IOS_APP_ID_DEV }}
          FIREBASE_IOS_SENDER_ID_DEV: ${{ secrets.FIREBASE_IOS_SENDER_ID_DEV }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  firestore-rules-test:
    name: Firestore Rules Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java (required by Firebase emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firestore-rules-tests/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install rules test dependencies
        working-directory: firestore-rules-tests
        run: npm ci

      - name: Run Firestore rules tests against emulator
        working-directory: firestore-rules-tests
        run: |
          firebase emulators:exec \
            --only firestore \
            --project brainforge-test \
            'npm run test:ci'

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: npm audit (backend functions)
        run: |
          if [ -d "functions" ]; then
            cd functions && npm audit --audit-level=high
          else
            echo "No Cloud Functions yet — skipping (added in WO-008)"
          fi

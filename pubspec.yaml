name: brainforge
description: BrainForge — Gamified academic companion and ScienceSpark summer discovery app for kids.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Game engine (ScienceSpark missions / animations)
  flame: ^1.18.0

  # Animations
  lottie: ^3.1.2

  # Local offline storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1
  firebase_auth: ^5.1.3
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_app_check: ^0.3.1+4

  # Utilities
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  intl: ^0.19.0
  logger: ^2.4.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  # freezed and hive_generator omitted at scaffold stage — both conflict with
  # Flutter 3.22's pinned meta 1.12.0. Re-add with correct constraints when
  # @freezed models are first introduced in a feature WO.

  # Linting
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

  # Testing
  mocktail: ^1.0.4
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/

name: brainforge
description: BrainForge — Gamified academic companion and ScienceSpark summer discovery app for kids.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  # riverpod_annotation removed — requires analyzer indirectly via
  # riverpod_generator; plain Provider syntax used instead (no code-gen needed).

  # Navigation
  go_router: ^14.2.0

  # Game engine (ScienceSpark missions / animations)
  flame: ^1.18.0

  # Animations
  lottie: ^3.1.2

  # Local offline storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1
  firebase_auth: ^5.1.3
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_app_check: ^0.3.1+4

  # Utilities
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  intl: ^0.19.0
  logger: ^2.4.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^4.0.0

  # Testing
  mocktail: ^1.0.4
  fake_async: ^1.3.1

  # Code-generation tools (build_runner, riverpod_generator, json_serializable,
  # freezed, hive_generator, custom_lint, riverpod_lint) are intentionally
  # omitted at this scaffold stage. All of them transitively require
  # analyzer >=6.5 which conflicts with Flutter 3.22's pinned meta 1.12.0.
  # The .g.dart files in this PR are hand-authored stubs. Re-add generators
  # once Flutter upgrades its meta pin (expected in Flutter 3.24+).

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/

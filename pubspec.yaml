name: brainforge
description: BrainForge — Gamified academic companion and ScienceSpark summer discovery app for kids.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  cloud_firestore: ^5.2.1
  cloud_functions: ^5.1.0
  equatable: ^2.0.5
  firebase_analytics: ^11.2.1
  firebase_app_check: ^0.3.1+4
  firebase_auth: ^5.1.3
  firebase_core: ^3.3.0
  firebase_crashlytics: ^4.0.4
  flame: ^1.18.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  logger: ^2.4.0
  lottie: ^3.1.2

dev_dependencies:
  fake_async: ^1.3.1
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  # Code-generation tools (build_runner, riverpod_generator, json_serializable,
  # freezed, hive_generator, custom_lint, riverpod_lint) are intentionally
  # omitted — all require analyzer >=6.5 which conflicts with Flutter 3.22's
  # pinned meta 1.12.0. Re-add once Flutter upgrades its meta pin (3.24+).

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
    - assets/images/
